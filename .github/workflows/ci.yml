name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    # These are throwaway credentials for an ephemeral Postgres container that
    # lives only for the duration of this job — not a real secret. Hardcoding
    # them (rather than requiring repo secrets) keeps CI green out of the box,
    # including on forks and PRs from contributors who can't see this repo's
    # secrets.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: uptime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: uptime_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DISABLE_SCHEDULER: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app
